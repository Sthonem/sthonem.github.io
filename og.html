<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1200px;height:630px;overflow:hidden;position:relative;background:#0a0b0d;
    background-image:
      radial-gradient(720px 520px at 90% -12%, rgba(30,200,214,.18), transparent 70%),
      radial-gradient(620px 460px at -6% 112%, rgba(95,224,234,.09), transparent 70%);
    color:#eceef1;font-family:'Inter',system-ui,sans-serif;
    display:flex;flex-direction:column;justify-content:center;padding:0 90px}
  .top{display:flex;align-items:center;gap:18px;margin-bottom:40px}
  .top img{height:58px;width:auto;display:block}
  .top .wm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:30px;letter-spacing:-.02em;text-transform:lowercase}
  .top .wm .d{color:#1ec8d6}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:96px;line-height:.98;letter-spacing:-.04em;margin-bottom:28px;white-space:nowrap}
  h1 .d{color:#1ec8d6}
  .role{font-family:'JetBrains Mono',monospace;font-size:30px;color:#1ec8d6;margin-bottom:30px;letter-spacing:.01em}
  .role .c{color:#6a7280;margin-right:10px}
  .proof{font-size:27px;color:#a2a9b4}
  .proof b{color:#eceef1;font-weight:600}
  .url{position:absolute;bottom:52px;left:90px;font-family:'JetBrains Mono',monospace;font-size:22px;color:#6a7280}
  .pill{position:absolute;top:52px;right:90px;font-family:'JetBrains Mono',monospace;font-size:19px;color:#1ec8d6;border:1px solid rgba(30,200,214,.32);background:rgba(30,200,214,.12);padding:9px 18px;border-radius:999px;display:flex;align-items:center;gap:9px}
  .pill i{width:9px;height:9px;border-radius:50%;background:#1ec8d6;display:block}
</style></head>
<body>
  <div class="pill"><i></i>open to opportunities</div>
  <div class="top"><img src="logo-ea-white.png" alt=""><span class="wm">erdem aslan<span class="d">.</span></span></div>
  <h1>Erdem Aslan<span class="d">.</span></h1>
  <div class="role"><span class="c">&gt;</span>Software &amp; AI Engineer</div>
  <div class="proof"><b>arXiv paper</b> · AI / LLM · Computer Vision · Full-Stack</div>
  <div class="url">sthonem.github.io</div>
</body></html>
